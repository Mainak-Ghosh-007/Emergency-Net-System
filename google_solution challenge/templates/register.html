<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EmergencyNet — Register</title>

<link rel="stylesheet" href="/static/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="auth-body">


<!-- BACKGROUND -->
<div class="auth-bg">
    <div class="auth-pulse"></div>
    <div class="auth-pulse delay1"></div>
    <div class="auth-pulse delay2"></div>
</div>



<div class="auth-container">

    <div class="auth-card wider">

        <!-- LOGO -->
        <div class="auth-logo">

            <div class="logo-icon">
                🛡️
            </div>

            <h1>
                EmergencyNet
            </h1>

            <p class="auth-tagline">
                Create your safety profile
            </p>

        </div>



        <!-- FORM -->
        <div class="auth-form-section">

            <h2>
                Register
            </h2>

            <p class="auth-sub">
                Enter your details to continue
            </p>


            <!-- NAME + PHONE -->
            <div class="form-row">

                <div class="form-group">

                    <label>
                        Full Name *
                    </label>

                    <div class="input-wrap">
                        <span class="input-icon">
                            👤
                        </span>

                        <input
                            type="text"
                            id="name"
                            placeholder="Your full name"
                        >
                    </div>

                </div>



                <div class="form-group">

                    <label>
                        Phone Number *
                    </label>

                    <div class="input-wrap">

                        <span class="input-icon">
                            📱
                        </span>

                        <input
                            type="tel"
                            id="phone"
                            placeholder="10-digit number"
                            maxlength="10"
                        >

                    </div>

                </div>

            </div>



            <!-- EMAIL -->
            <div class="form-group">

                <label>
                    Email Address *
                </label>

                <div class="input-wrap">

                    <span class="input-icon">
                        ✉️
                    </span>

                    <input
                        type="email"
                        id="email"
                        placeholder="your@email.com"
                    >

                </div>

            </div>



            <!-- GENDER -->
            <div class="form-group">

                <label>
                    Gender *
                </label>

                <div class="input-wrap">

                    <span class="input-icon">
                        ⚧️
                    </span>

                    <select id="gender">

                        <option value="">
                            Select Gender
                        </option>

                        <option value="male">
                            Male
                        </option>

                        <option value="female">
                            Female
                        </option>

                        <option value="other">
                            Other
                        </option>

                    </select>

                </div>

            </div>



            <!-- EMERGENCY CONTACT -->
            <div class="form-group">

                <label>
                    Emergency Contact Number
                </label>

                <div class="input-wrap">

                    <span class="input-icon">
                        🆘
                    </span>

                    <input
                        type="tel"
                        id="emergency_contact"
                        placeholder="Trusted person's number"
                        maxlength="10"
                    >

                </div>

            </div>



            <!-- BUTTON -->
            <button
                class="btn-primary"
                onclick="doRegister()"
            >
                <span id="btnText">
                    Create Account
                </span>

                <span class="btn-arrow">
                    →
                </span>
            </button>



            <div
                id="msg"
                class="msg-box hidden"
            ></div>



            <div class="auth-divider">
                <span>
                    Already registered?
                </span>
            </div>



            <a
                href="/"
                class="btn-secondary"
            >
                Back to Login
            </a>

        </div>

    </div>

</div>



<script>

async function doRegister() {

    const name =
        document
        .getElementById("name")
        .value
        .trim();

    const phone =
        document
        .getElementById("phone")
        .value
        .trim();

    const email =
        document
        .getElementById("email")
        .value
        .trim();

    const gender =
        document
        .getElementById("gender")
        .value;

    const emergency_contact =
        document
        .getElementById("emergency_contact")
        .value
        .trim();


    if (
        !name ||
        !phone ||
        !email ||
        !gender
    ) {
        showMsg(
            "❌ Fill all required fields.",
            "error"
        );
        return;
    }


    if (phone.length < 10) {
        showMsg(
            "❌ Enter valid phone number.",
            "error"
        );
        return;
    }


    const btnText =
        document.getElementById(
            "btnText"
        );

    btnText.textContent =
        "Creating...";


    try {

        const res =
            await fetch(
                "/register",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({
                        name,
                        phone,
                        email,
                        gender,
                        emergency_contact
                    })
                }
            );

        const data =
            await res.json();


        if (data.success) {

            showMsg(
                "✅ Account created successfully!",
                "success"
            );

            setTimeout(
                function () {
                    window.location.href =
                        "/";
                },
                1500
            );

        } else {

            showMsg(
                "❌ " + data.message,
                "error"
            );

            btnText.textContent =
                "Create Account";
        }

    } catch (error) {

        showMsg(
            "❌ Connection error.",
            "error"
        );

        btnText.textContent =
            "Create Account";
    }

}



function showMsg(text, type) {

    const el =
        document.getElementById("msg");

    el.textContent =
        text;

    el.className =
        "msg-box " + type;
}

</script>

</body>
</html>
